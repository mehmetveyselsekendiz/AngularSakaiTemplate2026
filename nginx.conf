# MFA Frontend — nginx server bloğu (/etc/nginx/conf.d/default.conf)
# Port 8080 (unprivileged), SPA fallback, /health, runtime config.js no-cache.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sağlık kontrolü (OpenShift readiness/liveness probe)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Runtime env — asla cache'leme (ConfigMap her dağıtımda değişebilir)
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Hash'li statik varlıklar — uzun süreli cache
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — tüm rotalar index.html'e
    location / {
        try_files $uri $uri/ /index.html;
    }
}
