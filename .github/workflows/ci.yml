name: CI

# MFA Angular Template — kalite kapısı.
# Governance (palet/CDN/import) + production build yeşil olmadan merge edilmez.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Governance — palet/CDN/import tarayıcı
        run: npm run lint:palette

      - name: Token senkronu — 3 palet dosyası ayrışmamalı
        run: npm run lint:tokens

      - name: Snippet tazeliği (npm run snippets fark üretmemeli)
        run: |
          npm run snippets
          git diff --exit-code -- public/snippets \
            || (echo "::error::public/snippets guncel degil — 'npm run snippets' calistirip commit'leyin." && exit 1)

      - name: Script testleri — saf-Node governance (node --test)
        run: npm run test:scripts

      - name: Birim testleri — zoneless (headless Chrome)
        run: npm test

      - name: Production build
        run: npm run build
